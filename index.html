<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Famous Witches & Wizards – HP PC Cards</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <meta name="description" content="Browse all 206 Famous Witches &amp; Wizards cards from the Harry Potter PC game trilogy (2001–2004). Includes HP1, HP2, and HP3 collections with card art, bios, and rarity tiers.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="HP PC Cards">
  <meta property="og:title" content="Famous Witches &amp; Wizards – HP PC Cards">
  <meta property="og:description" content="Browse all 206 wizard cards from the Harry Potter PC game trilogy (2001–2004).">
  <meta property="og:url" content="https://hp-cards.netlify.app">
  <meta property="og:image" content="https://hp-cards.netlify.app/images/game-selector/hp2.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Famous Witches &amp; Wizards – HP PC Cards">
  <meta name="twitter:description" content="Browse all 206 wizard cards from the Harry Potter PC game trilogy (2001–2004).">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,500;0,600;1,500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
</head>

<body>

  <a href="#app" class="skip-link">Skip to main content</a>
  <canvas id="starfield" aria-hidden="true"></canvas>
  <nav class="site-nav">
    <a class="github-link" href="https://github.com/bukazoltan/hp-cards" target="_blank" rel="noopener" aria-label="View on GitHub">
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      <span>GitHub</span>
    </a>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
      <span class="toggle-icon">☀</span><span class="toggle-label">Light</span>
    </button>
  </nav>
  <main id="app">
    <div class="loading">Unpacking wizard cards…</div>
  </main>
  <footer class="site-footer">
    Card images sourced from <a href="https://hp-games.net" target="_blank" rel="noopener">hp-games.net</a>
  </footer>

  <script>
    /* ── Theme ────────────────────────────────────────────────────────────────── */
    const Theme = {
      init() {
        const osPref = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        const saved = localStorage.getItem('theme') || osPref;
        this.set(saved, false);
        document.getElementById('theme-toggle').addEventListener('click', () => {
          this.set(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');
        });
      },
      set(t, save = true) {
        document.documentElement.dataset.theme = t;
        const btn = document.getElementById('theme-toggle');
        btn.querySelector('.toggle-icon').textContent = t === 'light' ? '☽' : '☀';
        btn.querySelector('.toggle-label').textContent = t === 'light' ? 'Dark' : 'Light';
        btn.setAttribute('aria-label', t === 'light' ? 'Switch to dark theme' : 'Switch to light theme');
        if (save) localStorage.setItem('theme', t);
      },
      isLight() { return document.documentElement.dataset.theme === 'light'; },
    };
    Theme.init();

    /* ── Starfield ────────────────────────────────────────────────────────────── */
    (function () {
      const cvs = document.getElementById('starfield');
      const ctx = cvs.getContext('2d');
      let W, H, stars;

      function resize() {
        W = cvs.width = window.innerWidth;
        H = cvs.height = window.innerHeight;
      }

      function mkStars(n) {
        return Array.from({ length: n }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.15 + .15,
          phase: Math.random() * Math.PI * 2,
          speed: Math.random() * .0015 + .0005,
        }));
      }

      function draw(t) {
        ctx.clearRect(0, 0, W, H);
        const light = Theme.isLight();
        // Dark: pale gold stars. Light: soft warm dust motes at low opacity.
        const [r, g, b] = light ? [140, 95, 30] : [210, 188, 138];
        const maxA = light ? .32 : .77;
        const minA = light ? .08 : .12;
        for (const s of stars) {
          const a = ((Math.sin(t * s.speed + s.phase) + 1) / 2) * (maxA - minA) + minA;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${r},${g},${b},${a.toFixed(2)})`;
          ctx.fill();
        }
        requestAnimationFrame(draw);
      }

      resize();
      stars = mkStars(220);
      window.addEventListener('resize', () => { resize(); stars = mkStars(220); });
      requestAnimationFrame(draw);
    })();

    /* ── Helpers ──────────────────────────────────────────────────────────────── */
    function esc(s) {
      return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    const GAME_META = {
      HP1: { title: "The Philosopher's Stone", short: "Philosopher's Stone", year: '2001', roman: 'Game I', slug: 'hp1', c: 'var(--c-hp1)', g: 'var(--g-hp1)' },
      HP2: { title: "The Chamber of Secrets", short: "Chamber of Secrets", year: '2002', roman: 'Game II', slug: 'hp2', c: 'var(--c-hp2)', g: 'var(--g-hp2)' },
      HP3: { title: "The Prisoner of Azkaban", short: "Prisoner of Azkaban", year: '2004', roman: 'Game III', slug: 'hp3', c: 'var(--c-hp3)', g: 'var(--g-hp3)' },
    };

    /* ── App ──────────────────────────────────────────────────────────────────── */
    const App = {
      cards: null,
      keyNav: null,

      async init() {
        this.cards = await fetch('/cards.json').then(r => r.json());

        // Preload all card images in the background after initial render
        const idle = window.requestIdleCallback || (cb => setTimeout(cb, 200));
        idle(() => {
          for (const card of this.cards) {
            if (card.image_local) {
              const img = new Image();
              img.src = '/' + card.image_local;
            }
          }
        }, { timeout: 3000 });

        document.addEventListener('click', e => {
          const el = e.target.closest('[data-link]');
          if (!el) return;
          e.preventDefault();
          this.go(el.dataset.link);
        });

        window.addEventListener('popstate', () => this.route());
        document.addEventListener('keydown', e => {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.metaKey || e.ctrlKey) return;
          const kn = this.keyNav;
          if (!kn) return;
          if (e.key === 'ArrowLeft'  && kn.prev)   { e.preventDefault(); this.go(kn.prev); }
          if (e.key === 'ArrowRight' && kn.next)   { e.preventDefault(); this.go(kn.next); }
          if ((e.key === 'r' || e.key === 'R') && kn.random) this.go(kn.random);
        });
        this.route();
      },

      go(path) {
        history.pushState({}, '', path);
        window.scrollTo({ top: 0, behavior: 'smooth' });
        this.route();
      },

      route() {
        const [, gameSlug, rawId] = window.location.pathname.split('/');
        const game = (gameSlug || '').toUpperCase();

        if (gameSlug === 'random') { this.renderTriple(); return; }
        if (gameSlug === 'shared') { this.renderShared(); return; }
        if (!gameSlug || !GAME_META[game]) { this.renderHome(); return; }

        const pool = this.cards.filter(c => c.game === game);

        if (!rawId || rawId === 'random') {
          const card = pool[Math.floor(Math.random() * pool.length)];
          history.replaceState({}, '', `/${gameSlug}/${card.game_id}`);
          this.renderCard(card, pool);
          return;
        }

        const id = parseInt(rawId, 10);
        const card = pool.find(c => c.game_id === id);
        card ? this.renderCard(card, pool) : this.renderHome();
      },

      renderShared() {
        this.keyNav = null;
        document.documentElement.style.removeProperty('--active-c');
        document.documentElement.style.removeProperty('--active-g');
        document.title = 'Same Card, Three Games – HP PC Cards';

        // Find all names present in all 3 games
        const byName = {};
        for (const c of this.cards) {
          const key = c.name.trim().toLowerCase();
          if (!byName[key]) byName[key] = {};
          byName[key][c.game] = c;
        }
        const shared = Object.values(byName).filter(g => g.HP1 && g.HP2 && g.HP3);
        const group = shared[Math.floor(Math.random() * shared.length)];
        const name = group.HP1.name;

        const cardHtml = (card, m) => `
      <div class="shared-card ${m.slug}">
        <p class="shared-game-label">${m.roman} · ${esc(m.short)}</p>
        <div class="card-img-wrap${card.rarity ? ' holo' : ''}" style="width:fit-content;margin:0 auto 1rem">
          <img class="shared-img" src="/${esc(card.image_local)}" alt="${esc(card.name)}" style="margin:0">
        </div>
        ${card.rarity ? `<div class="shared-rarity ${card.rarity.toLowerCase()}">${esc(card.rarity)}</div>` : ''}
        ${card.location ? `
          <div class="shared-loc">
            <strong>Where to find</strong>
            ${esc(card.location)}
          </div>` : ''}
        <a href="/${m.slug}/${card.game_id}" class="shared-view-link" data-link="/${m.slug}/${card.game_id}">View full card →</a>
      </div>`;

        document.getElementById('app').innerHTML = `
      <div class="page">
        <div class="card-topbar">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="/" data-link="/">Collection</a>
            <span class="breadcrumb-sep" aria-hidden="true">›</span>
            <span aria-current="page">Same Card, Three Games</span>
          </nav>
          <a href="/shared/random" class="btn-rnd" data-link="/shared/random">✦ Draw Another</a>
        </div>

        <header class="shared-hero">
          <div class="ornament" aria-hidden="true">✦</div>
          <h1 class="shared-name">${esc(name)}</h1>
          <p class="shared-sub">Same wizard · Three games</p>
          <div class="ornament" aria-hidden="true" style="margin-top:1.2rem">✦</div>
        </header>

        <div class="shared-grid">
          ${cardHtml(group.HP1, GAME_META.HP1)}
          ${cardHtml(group.HP2, GAME_META.HP2)}
          ${cardHtml(group.HP3, GAME_META.HP3)}
        </div>

        <a href="/shared/random" class="btn-redraw" data-link="/shared/random">✦ Draw Another</a>
      </div>`;

        document.querySelectorAll('.shared-card .card-img-wrap').forEach(initTilt);
      },

      renderTriple() {
        this.keyNav = null;
        document.documentElement.style.removeProperty('--active-c');
        document.documentElement.style.removeProperty('--active-g');
        document.title = 'Draw Three – HP PC Cards';

        const pick = game => {
          const pool = this.cards.filter(c => c.game === game);
          return pool[Math.floor(Math.random() * pool.length)];
        };

        const cards = { HP1: pick('HP1'), HP2: pick('HP2'), HP3: pick('HP3') };

        const cardHtml = (card, m) => `
      <div class="triple-card ${m.slug}">
        <p class="triple-game-label">${m.roman} · ${esc(m.short)}</p>
        <div class="card-img-wrap${card.rarity ? ' holo' : ''}" style="width:fit-content;margin:0 auto 1.25rem">
          <img class="triple-img" src="/${esc(card.image_local)}" alt="${esc(card.name)}" style="margin:0">
        </div>
        <p class="triple-card-name">${esc(card.name)}</p>
        ${card.dates ? `<p class="triple-card-dates">${esc(card.dates)}</p>` : ''}
        ${card.location ? `
          <div class="triple-card-loc">
            <strong>Where to find</strong>
            ${esc(card.location)}
          </div>` : ''}
        <a href="/${m.slug}/${card.game_id}" class="triple-view-link" data-link="/${m.slug}/${card.game_id}">View full card →</a>
      </div>`;

        document.getElementById('app').innerHTML = `
      <div class="page">
        <div class="card-topbar">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="/" data-link="/">Collection</a>
            <span class="breadcrumb-sep" aria-hidden="true">›</span>
            <span aria-current="page">Draw Three</span>
          </nav>
          <a href="/random" class="btn-rnd" data-link="/random">✦ Redraw All</a>
        </div>

        <header class="triple-header">
          <div class="ornament" aria-hidden="true">✦</div>
          <h1 class="triple-title" style="margin: 1.2rem 0 .5rem">Draw Three</h1>
          <p class="triple-sub">One card from each game</p>
          <div class="ornament" aria-hidden="true" style="margin-top:1.2rem">✦</div>
        </header>

        <div class="triple-grid">
          ${cardHtml(cards.HP1, GAME_META.HP1)}
          ${cardHtml(cards.HP2, GAME_META.HP2)}
          ${cardHtml(cards.HP3, GAME_META.HP3)}
        </div>

        <a href="/random" class="btn-redraw" data-link="/random">✦ Draw Again</a>
      </div>`;

        document.querySelectorAll('.triple-card .card-img-wrap').forEach(initTilt);
      },

      renderHome() {
        this.keyNav = null;
        document.documentElement.style.removeProperty('--active-c');
        document.documentElement.style.removeProperty('--active-g');
        document.title = 'Famous Witches & Wizards – HP PC Cards';

        const counts = {};
        for (const g of Object.keys(GAME_META))
          counts[g] = this.cards.filter(c => c.game === g).length;

        document.getElementById('app').innerHTML = `
      <div class="page">
        <header class="home-header">
          <div class="ornament" aria-hidden="true">✦</div>
          <h1 class="home-title">Famous Witches<br>&amp; Wizards</h1>
          <p class="home-sub">Harry Potter · PC Collection · 2001–2004</p>
          <div class="ornament" aria-hidden="true" style="margin-bottom:1.5rem">✦</div>
          <div style="display:flex;gap:1.25rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem">
            <a href="/random" class="btn-draw btn-hero" data-link="/random">✦ &nbsp;Draw One from Each Game</a>
            <a href="/shared/random" class="btn-draw btn-hero" data-link="/shared/random">✦ &nbsp;Same Card, Three Games</a>
          </div>
        </header>

        <div class="games-grid">
          ${Object.entries(GAME_META).map(([g, m]) => `
            <article class="game-panel ${m.slug}">
              <p class="panel-roman">${m.roman}</p>
              <h2 class="panel-title">Harry Potter &amp; ${esc(m.title)}</h2>
              <p class="panel-year">${m.year} &nbsp;·&nbsp; PC</p>
              <div class="panel-count">${counts[g]}</div>
              <p class="panel-count-label">Wizard Cards</p>
              <a href="/${m.slug}/random" class="btn-draw" data-link="/${m.slug}/random">Draw a Card</a>
            </article>
          `).join('')}
        </div>
      </div>`;
      },

      renderCard(card, pool) {
        const m = GAME_META[card.game];
        const sorted = [...pool].sort((a, b) => a.game_id - b.game_id);
        const idx = sorted.findIndex(c => c.game_id === card.game_id);
        const prev = sorted[idx - 1];
        const next = sorted[idx + 1];

        this.keyNav = {
          prev:   prev ? `/${m.slug}/${prev.game_id}` : null,
          next:   next ? `/${m.slug}/${next.game_id}` : null,
          random: `/${m.slug}/random`,
        };

        document.documentElement.style.setProperty('--active-c', m.c);
        document.documentElement.style.setProperty('--active-g', m.g);
        document.title = `${card.name} – ${m.short}`;

        const rarityHtml = card.rarity
          ? `<div class="rarity-badge ${card.rarity.toLowerCase()}">${esc(card.rarity)}</div>`
          : '';

        const descHtml = card.description
          ? `<p class="card-desc">${esc(card.description)}</p>`
          : '';

        const locHtml = card.location ? `
      <div class="card-loc">
        <span class="loc-label">Where to find</span>
        <p class="loc-text">${esc(card.location)}</p>
      </div>` : '';

        const navPrev = prev ? `
      <a href="/${m.slug}/${prev.game_id}" class="nav-btn prev" data-link="/${m.slug}/${prev.game_id}">
        <span class="nav-dir">← Previous</span>
        <span class="nav-name">${esc(prev.name)}</span>
      </a>` : '<span></span>';

        const navNext = next ? `
      <a href="/${m.slug}/${next.game_id}" class="nav-btn next" data-link="/${m.slug}/${next.game_id}">
        <span class="nav-dir">Next →</span>
        <span class="nav-name">${esc(next.name)}</span>
      </a>` : '<span></span>';

        document.getElementById('app').innerHTML = `
      <div class="page">
        <div class="card-topbar">
          <nav class="breadcrumb" aria-label="Breadcrumb">
            <a href="/" data-link="/">Collection</a>
            <span class="breadcrumb-sep" aria-hidden="true">›</span>
            <a href="/${m.slug}/random" data-link="/${m.slug}/random">${esc(m.short)}</a>
            <span class="breadcrumb-sep" aria-hidden="true">›</span>
            <span aria-current="page">${esc(card.name)}</span>
          </nav>
          <a href="/${m.slug}/random" class="btn-rnd" data-link="/${m.slug}/random">✦ Draw Random</a>
        </div>

        <div class="card-layout">
          <div class="card-img-zone">
            <div class="card-glow"></div>
            <div class="card-img-wrap${card.rarity ? ' holo' : ''}">
              <img class="card-img"
                   src="/${esc(card.image_local)}"
                   alt="${esc(card.name)}"
                   loading="eager">
            </div>
            ${rarityHtml}
          </div>

          <div class="card-details">
            <p class="card-meta-line">${esc(m.roman)} &nbsp;·&nbsp; No.&nbsp;${card.game_id} &nbsp;·&nbsp; ${idx + 1}&thinsp;/&thinsp;${sorted.length}</p>
            <h1 class="card-name">${esc(card.name)}</h1>
            ${card.dates ? `<p class="card-dates">${esc(card.dates)}</p>` : ''}
            <div class="rule"></div>
            ${descHtml}
            ${locHtml}
            <div class="card-actions">
              <a href="/${m.slug}/random" class="btn-primary" data-link="/${m.slug}/random">Draw Another</a>
              <a href="/" class="btn-ghost" data-link="/">All Games</a>
            </div>
            <div class="card-nav">
              ${navPrev}
              ${navNext}
            </div>
            <p class="key-hint">← → navigate &nbsp;·&nbsp; R random</p>
          </div>
        </div>
      </div>`;

        initTilt(document.querySelector('.card-img-wrap'));
        const img = document.querySelector('.card-img');
        if (img) img.addEventListener('error', () => img.classList.add('error'), { once: true });
      },
    };

    function initTilt(wrap) {
      if (!wrap) return;
      const TILT = 28;

      wrap.addEventListener('animationend', () => {
        wrap.style.animation = 'none';
      }, { once: true });

      wrap.addEventListener('mousemove', e => {
        const r = wrap.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width;
        const y = (e.clientY - r.top)  / r.height;
        const rx = (y - .5) * -TILT * 2;
        const ry = (x - .5) *  TILT * 2;
        const angle = Math.atan2(y - .5, x - .5) * (180 / Math.PI) + 90;
        wrap.style.transform =
          `perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.03)`;
        wrap.style.setProperty('--mx', `${(x * 100).toFixed(1)}%`);
        wrap.style.setProperty('--my', `${(y * 100).toFixed(1)}%`);
        wrap.style.setProperty('--holo-angle', `${angle.toFixed(1)}deg`);
      });

      wrap.addEventListener('mouseleave', () => {
        wrap.style.transform = 'perspective(600px) rotateX(0deg) rotateY(0deg) scale(1)';
      });
    }

    App.init().catch(err => {
      document.getElementById('app').innerHTML =
        `<div class="loading">Failed to load card data.<br><small>${esc((err && (err.stack || err.message)) || err)}</small></div>`;
      console.error(err);
    });
  </script>
</body>

</html>
